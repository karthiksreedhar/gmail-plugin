services:
  - type: web
    name: gmail-plugin
    env: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: bash -lc 'mkdir -p "data/${CURRENT_USER_EMAIL}" && if [ -n "$GCP_OAUTH_KEYS_JSON" ]; then printf "%s" "$GCP_OAUTH_KEYS_JSON" > "data/${CURRENT_USER_EMAIL}/gcp-oauth.keys.json"; fi; node server.js'
    healthCheckPath: /api/current-user
    autoDeploy: true
    envVars:
      # Core runtime
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000" # Render injects PORT; server uses process.env.PORT || 3000

      # Feature flags: Mongo in production
      - key: USE_DB
        value: "true"
      - key: DB_TYPE
        value: mongo

      # MongoDB Atlas connection (set the value in Render dashboard or with Blueprint secrets)
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: gmail-plugin

      # OpenAI (AI features)
      - key: OPENAI_API_KEY
        sync: false

      # Default current user context (can be changed via API /api/switch-user)
      - key: CURRENT_USER_EMAIL
        value: ks4190@columbia.edu
      - key: SENDING_EMAIL
        value: ks4190@columbia.edu

      # Optional: restrict which users are allowed in production (comma-separated)
      - key: ALLOWED_USERS
        value: ks4190@columbia.edu,lc3251@columbia.edu

      # OAuth redirect for Render (must match your Google OAuth client)
      - key: OAUTH_REDIRECT_URI
        value: https://gmail-plugin.onrender.com/oauth2callback

      # Provide your Google OAuth credentials JSON as a single-line secret.
      # Example: paste the full contents of client_secret_...json
      - key: GCP_OAUTH_KEYS_JSON
        sync: false

      # Optional: explicitly set the base URL used to pick redirect URI
      - key: BASE_URL
        value: https://gmail-plugin.onrender.com
